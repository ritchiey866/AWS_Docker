{% extends "base.html" %}
{% from "_macros.html" import btn_primary, input_field %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="relative overflow-hidden rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur-xl sm:p-10">
    <div class="pointer-events-none absolute -right-16 -top-16 h-48 w-48 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div class="pointer-events-none absolute -bottom-16 -left-16 h-48 w-48 rounded-full bg-violet-500/20 blur-3xl"></div>

    <div class="relative">
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 text-xl font-bold text-white shadow-glow">F</div>
            <h1 class="text-2xl font-bold text-white">Welcome back</h1>
            <p class="mt-2 text-sm text-slate-400">Sign in to manage your Flask application</p>
        </div>

        <form method="post" class="space-y-5">
            <div class="space-y-2">
                <label for="username" class="block text-sm font-semibold text-slate-300">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required
                       class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/20">
            </div>
            <div class="space-y-2">
                <label for="password" class="block text-sm font-semibold text-slate-300">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required
                       class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/20">
            </div>
            <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-500/30 transition hover:from-indigo-500 hover:to-violet-500">
                Sign in
            </button>
        </form>
    </div>
</div>
{% endblock %}
