services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    ports:
      - "${WEB_PORT:-8000}:8000"
    command: flask run --host=0.0.0.0 --port=8000 --debug

  nginx:
    profiles:
      - with-nginx
